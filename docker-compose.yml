name: immich-semantic-captioner

services:
  immich-captioner:
    container_name: immich_captioner

    build:
      context: ./captioner
      dockerfile: Dockerfile
      args:
        CUDA_BASE_IMAGE: ${CUDA_BASE_IMAGE}

    image: immich-semantic-captioner:${IMAGE_TAG:-known-good}

    networks:
      - immich_default

    environment:
      - IMMICH_URL=${IMMICH_URL}
      - IMMICH_API_KEY=${IMMICH_API_KEY}

      - BATCH_SIZE=${BATCH_SIZE}
      - SLEEP_SECONDS=${SLEEP_SECONDS}
      - IDLE_SLEEP_SECONDS=${IDLE_SLEEP_SECONDS}
      - MAX_CAPTION_CHARS=${MAX_CAPTION_CHARS}
      - USER_AGENT=${USER_AGENT}

      - DRY_RUN=${DRY_RUN}
      - CAPTION_VIDEOS=${CAPTION_VIDEOS}
      - VIDEO_TAIL_SECONDS=${VIDEO_TAIL_SECONDS}
      - VIDEO_TAIL_INTERVAL_SECONDS=${VIDEO_TAIL_INTERVAL_SECONDS}
      - VIDEO_HEAD_FRAME_COUNT=${VIDEO_HEAD_FRAME_COUNT}
      - MAX_VIDEO_FRAMES=${MAX_VIDEO_FRAMES}
      - ENABLE_TAGS=${ENABLE_TAGS}

      - FLORENCE_MODEL=${FLORENCE_MODEL}
      - JOYCAPTION_MODEL=${JOYCAPTION_MODEL}
      - EXPLICIT_CAPTIONS=${EXPLICIT_CAPTIONS}

      - PGHOST=${PGHOST}
      - PGPORT=${PGPORT}
      - PGDATABASE=${PGDATABASE}
      - PGUSER=${PGUSER}
      - PGPASSWORD=${PGPASSWORD}
      - USE_API_ONLY=${USE_API_ONLY}
      - PYTHONPATH=/opt/overrides
      - IDENTITY_ALBUM_MAP=${IDENTITY_ALBUM_MAP}
      - IDENTITY_NOUN_HINTS=${IDENTITY_NOUN_HINTS}
      - IDENTITY_ENSURE_MODE=${IDENTITY_ENSURE_MODE}

    gpus: all
    restart: unless-stopped

    volumes:
      - captioner-hf-cache:/root/.cache/huggingface
      - ./captioner/captioner.py:/app/captioner.py:ro
      - ./captioner/overrides:/opt/overrides:ro

volumes:
  captioner-hf-cache:

networks:
  immich_default:
    external: true
